services:
  bot-whatsapp:
    build:
      context: .
      dockerfile: Dockerfile
    image: bot-whatsapp:local
    container_name: bot-whatsapp
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3001:3001"
    volumes:
      # Persist Baileys session across restarts.
      # Provider uses: "<BOT_SESSION_NAME>_sessions" (default "fuller_bot_sessions")
      - ./fuller_bot_sessions:/app/fuller_bot_sessions
